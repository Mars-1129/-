name: TikStream Production CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Lint OpenAPI contract
        run: pnpm openapi:lint

      - name: Run lint
        run: pnpm lint

      - name: Run typecheck
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Build workspaces
        run: pnpm build

  compose-integration:
    runs-on: ubuntu-latest
    needs: lint-typecheck-test-build
    env:
      DATABASE_URL: postgresql://tikstream:tikstream_password@localhost:5432/tikstream_ai?schema=public
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start infrastructure
        run: docker compose up -d postgres redis kafka qdrant minio minio-init

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Push database schema
        run: pnpm db:push

      - name: Seed database
        run: pnpm db:seed

      - name: Build Docker images
        run: docker compose build server-gateway web-client gpu-slicing-worker remotion-render-worker

      - name: Start full stack
        run: docker compose up -d server-gateway web-client gpu-slicing-worker remotion-render-worker

      - name: Run smoke checks
        run: pnpm smoke

      - name: Show Compose status on failure
        if: failure()
        run: docker compose ps && docker compose logs --tail=200

      - name: Stop Compose stack
        if: always()
        run: docker compose down -v

  build-images:
    runs-on: ubuntu-latest
    needs: compose-integration
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build release images
        run: docker compose build server-gateway web-client gpu-slicing-worker remotion-render-worker

      - name: Validate Compose configuration
        run: docker compose config --quiet
